  <script>
    // Commit Board functionality with Netlify Functions
    class CommitBoard {
      constructor() {
        this.notes = [];
        this.calendarData = {};
        this.init();
      }

      async init() {
        await this.loadNotes();
        this.buildCalendarData();
        this.renderCalendar();
        this.displayNotes();
        this.setupEventListeners();
      }

      setupEventListeners() {
        const form = document.getElementById('commitForm');
        const textarea = document.getElementById('noteText');
        const charCounter = document.getElementById('charCounter');
        
        // Character counter
        textarea.addEventListener('input', () => {
          const remaining = 160 - textarea.value.length;
          charCounter.textContent = remaining;
          charCounter.style.color = remaining < 20 ? '#d73a49' : '#666';
        });
      }

      async loadNotes() {
        try {
          // const response = await fetch('https://concourse-codes.netlify.app/.netlify/functions/get-notes');
          const response = await fetch('/.netlify/functions/get-notes');
          
          if (response.ok) {
            this.notes = await response.json();
          } else {
            console.error('Failed to fetch notes:', response.status);
            // Fallback to localStorage
            const stored = localStorage.getItem('commitNotes');
            this.notes = stored ? JSON.parse(stored) : [];
          }
        } catch (e) {
          console.error('Error loading notes:', e);
          // Fallback to localStorage
          const stored = localStorage.getItem('commitNotes');
          this.notes = stored ? JSON.parse(stored) : [];
        }
      }

      buildCalendarData() {
        this.calendarData = {};
        
        this.notes.forEach(note => {
          const date = new Date(note.timestamp);
          const dateKey = date.toISOString().split('T')[0]; // YYYY-MM-DD
          
          if (!this.calendarData[dateKey]) {
            this.calendarData[dateKey] = { count: 0, notes: [] };
          }
          
          this.calendarData[dateKey].count++;
          this.calendarData[dateKey].notes.push(note);
        });
      }

      renderCalendar() {
        const container = document.getElementById('commitCalendar');
        const today = new Date();
        
        // Calculate weeks to show (52 weeks)
        const weeks = 52;
        
        let html = '<div class="calendar-grid">';
        
        // Month labels - show month with year (e.g., "Apr '26")
        html += '<div class="month-labels">';
        
        // First, calculate which weeks belong to which months
        const monthRanges = [];
        let currentMonthKey = null;
        let rangeStart = 0;
        let currentLabel = '';
        
        for (let i = 0; i < weeks; i++) {
          const weekStartDaysAgo = i * 7;
          const weekStart = new Date(today);
          weekStart.setDate(today.getDate() - weekStartDaysAgo);
          
          const monthYearKey = `${weekStart.getFullYear()}-${weekStart.getMonth()}`;
          const month = weekStart.toLocaleDateString('en-US', { month: 'short' });
          const year = weekStart.getFullYear().toString().slice(-2);
          const monthYear = `${month} '${year}`;
          
          if (currentMonthKey !== monthYearKey) {
            // Close previous range if exists
            if (currentMonthKey !== null) {
              monthRanges.push({
                start: rangeStart,
                end: i - 1,
                label: currentLabel
              });
            }
            // Start new range
            currentMonthKey = monthYearKey;
            currentLabel = monthYear;
            rangeStart = i;
          }
        }
        
        // Add the final range
        if (currentMonthKey !== null) {
          monthRanges.push({
            start: rangeStart,
            end: weeks - 1,
            label: currentLabel
          });
        }
        
        // Now render month labels spanning their respective columns
        monthRanges.forEach((range) => {
          const colStart = range.start + 2; // +2 for day label offset
          const colEnd = range.end + 3; // +3 because grid-column-end is exclusive
          html += `<span style="grid-column: ${colStart} / ${colEnd}; text-align: left;">${range.label}</span>`;
        });
        
        html += '</div>';
        
        // Day labels (Mon, Wed, Fri) - positioned relative to today
        const todayDayOfWeek = today.getDay(); // 0 = Sunday, 1 = Monday, etc.
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        
        for (let day = 0; day < 7; day++) {
          const dayIndex = (todayDayOfWeek - day + 7) % 7; // Going backward from today
          const dayName = dayNames[dayIndex];
          
          // Only show Mon, Wed, Fri
          if (dayName === 'Mon' || dayName === 'Wed' || dayName === 'Fri') {
            html += `<div class="day-label" style="grid-row: ${day + 2};">${dayName}</div>`;
          }
        }
        
        // Calendar cells - today at top-left, going backward in time
        for (let week = 0; week < weeks; week++) {
          for (let day = 0; day < 7; day++) {
            const daysAgo = week * 7 + day;
            const currentDate = new Date(today);
            currentDate.setDate(today.getDate() - daysAgo);
            
            const dateKey = currentDate.toISOString().split('T')[0];
            const data = this.calendarData[dateKey];
            const count = data ? data.count : 0;
            
            // Determine intensity level (0-4)
            let level = 0;
            if (count > 0) {
              // console.log("[cal] Found a day with count > 0. ", dateKey);
              level = 1;
            }
            if (count >= 3) level = 2;
            if (count >= 5) level = 3;
            if (count >= 7) level = 4;
            
            const col = week + 2; // Offset for day labels
            const row = day + 2; // Offset for month labels
            
            html += `<div 
              class="calendar-cell level-${level}" 
              data-date="${dateKey}"
              data-count="${count}"
              style="grid-column: ${col}; grid-row: ${row};"
              title="${count} note${count !== 1 ? 's' : ''} on ${currentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}"
            ></div>`;
          }
        }
        
        html += '</div>';
        container.innerHTML = html;
      }

      displayNotes() {
        const container = document.getElementById('commitBoard');
        
        if (this.notes.length === 0) {
          container.innerHTML = '<div class="no-messages">No notes yet. Start committing your thoughts!</div>';
          return;
        }
        
        // Group notes by date
        const groupedNotes = {};
        this.notes.forEach(note => {
          const date = new Date(note.timestamp);
          const dateKey = date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
          });
          
          if (!groupedNotes[dateKey]) {
            groupedNotes[dateKey] = [];
          }
          groupedNotes[dateKey].push(note);
        });
        
        // Render grouped notes
        let html = '';
        Object.keys(groupedNotes).forEach(dateKey => {
          html += `<div class="date-group">
            <h4 class="date-header">${dateKey}</h4>`;
          
          groupedNotes[dateKey].forEach(note => {
            html += this.createNoteHTML(note);
          });
          
          html += '</div>';
        });
        
        container.innerHTML = html;
      }

      createNoteHTML(note) {
        const timestamp = this.formatTimestamp(note.timestamp);
        const charCount = note.content.length;
        
        return `
          <div class="commit-card">
            <div class="commit-header">
              <span class="commit-timestamp">${timestamp}</span>
              <span class="commit-char-count">${charCount}/160</span>
            </div>
            <div class="commit-content">${this.escapeHtml(note.content)}</div>
          </div>
        `;
      }

      showMessage(text, type) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `status-message ${type}`;
        messageDiv.textContent = text;
        
        const form = document.querySelector('.commit-form');
        form.insertBefore(messageDiv, form.firstChild);
        
        setTimeout(() => {
          messageDiv.remove();
        }, 3000);
      }

      formatTimestamp(isoString) {
        const date = new Date(isoString);
        const now = new Date();
        const diffMs = now - date;
        const diffMinutes = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        
        if (diffMinutes < 1) return 'just now';
        if (diffMinutes < 60) return `${diffMinutes}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;
        
        return date.toLocaleTimeString('en-US', {
          hour: 'numeric',
          minute: '2-digit',
          hour12: true
        });
      }

      escapeHtml(unsafe) {
        return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    }

    // Initialize the commit board when DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
      new CommitBoard();
    });
  </script>
